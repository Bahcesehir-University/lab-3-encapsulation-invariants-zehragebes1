name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: temperature
      id: temperature
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: temperature
        setup-command: make test_runner
        command: make temperature
        timeout: 2
        max-score: 30
    - name: bank
      id: bank
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: bank
        setup-command: make test_runner
        command: make bank
        timeout: 5
        max-score: 45
    - name: password
      id: password
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: password
        setup-command: make test_runner
        command: make password
        timeout: 10
        max-score: 25
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TEMPERATURE_RESULTS: "${{steps.temperature.outputs.result}}"
        BANK_RESULTS: "${{steps.bank.outputs.result}}"
        PASSWORD_RESULTS: "${{steps.password.outputs.result}}"
      with:
        runners: temperature,bank,password
